<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Beneš Home Dashboard</title>
<style>
body {font-family: -apple-system,BlinkMacSystemFont,sans-serif; max-width: 900px; margin:auto; padding:20px;}
details {margin:10px 0; border:1px solid #ddd; border-radius:8px; padding:10px;}
summary {font-weight:bold; cursor:pointer;}
label {display:block; padding:4px 0;}
h1 {text-align:center;}
.small {color:#666;font-size:0.9em;}
</style>
</head>
<body>
<h1>🏠 Beneš Home Dashboard</h1>
<p class="small">Checklisty se ukládají lokálně v zařízení.</p>

<details open><summary>📅 Denně – Večerní 3 minuty</summary>
<label><input type="checkbox"> Zkontrolovat mokré hadry</label>
<label><input type="checkbox"> Zkontrolovat dřez</label>
<label><input type="checkbox"> Rozvěsit mokré ručníky</label>
<label><input type="checkbox"> Zkontrolovat Winix</label>
</details>

<details><summary>📅 Pondělí – Textilie a hygiena</summary>
<label><input type="checkbox"> Vyměnit ručník na ruce</label>
<label><input type="checkbox"> Vyměnit osušku rodiče</label>
<label><input type="checkbox"> Vyměnit dětské osušky</label>
<label><input type="checkbox"> Vyměnit kuchyňské utěrky</label>
<label><input type="checkbox"> Vyprat použité ručníky</label>
<label><input type="checkbox"> Vyprat použité utěrky</label>
<label><input type="checkbox"> Vyprat použité hadříky</label>
</details>

<details><summary>📅 Úterý – Prach a vzduch</summary>
<label><input type="checkbox"> Otřít prach</label>
<label><input type="checkbox"> Otřít parapety</label>
<label><input type="checkbox"> Zkontrolovat Winix</label>
<label><input type="checkbox"> Zkontrolovat vlhkost</label>
<label><input type="checkbox"> Vyvětrat ložnice</label>
</details>

<details><summary>📅 Středa – Koupelna</summary>
<label><input type="checkbox"> Vyčistit WC</label>
<label><input type="checkbox"> Vyčistit umyvadlo</label>
<label><input type="checkbox"> Vyčistit baterie</label>
<label><input type="checkbox"> Vyčistit vanu</label>
<label><input type="checkbox"> Vyčistit odtok vany</label>
</details>

<details><summary>📅 Čtvrtek – Kuchyň a dřez</summary>
<label><input type="checkbox"> Dezinfikovat dřez</label>
<label><input type="checkbox"> Vyčistit odtok dřezu</label>
<label><input type="checkbox"> Vyčistit pracovní desku</label>
<label><input type="checkbox"> Otřít madla skříněk</label>
</details>

<details><summary>📅 Pátek – Podlahy</summary>
<label><input type="checkbox"> Vysát byt</label>
<label><input type="checkbox"> Vytřít byt</label>
<label><input type="checkbox"> Zkontrolovat rohy</label>
</details>

<details><summary>📅 Neděle – Týdenní reset</summary>
<label><input type="checkbox"> Prolít odpady horkou vodou</label>
<label><input type="checkbox"> Vynést koše</label>
<label><input type="checkbox"> Připravit čisté ručníky</label>
</details>

<script>
const boxes=document.querySelectorAll('input[type=checkbox]');
boxes.forEach((box,i)=>{
 const key='benes_'+i;
 box.checked=localStorage.getItem(key)==='1';
 box.addEventListener('change',()=>localStorage.setItem(key,box.checked?'1':'0'));
});
</script>
</body>
</html>
